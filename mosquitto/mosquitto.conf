# Mosquitto config — CEROS / ROS2-RCS Twin (F2 data pipeline)
#
# F2 scope: simple username/password auth, two listeners (MQTT 1883 + WebSocket
# 9001), persistence. TLS port 8883 + coturn + cert rotation deferred to F10
# hardening. See INTERFACE_CONTRACT.md §3.

# ===== Auth (global; same for both listeners) =====
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ===== Persistence =====
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ===== Logging =====
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# ===== Listener 1: plain MQTT (port 1883) =====
# Used by the Jetson ceros_mqtt_bridge client.
# In F2 also exposed to Internet (no TLS yet). Firewall rules in wizard.sh.
listener 1883 0.0.0.0

# ===== Listener 2: WebSocket (port 9001) =====
# Used by the RCS-ROS2-CEROS Electron frontend (mqtt.js in renderer).
listener 9001 0.0.0.0
protocol websockets

# ===== Connection limits =====
max_connections 100
max_inflight_messages 50
max_queued_messages 1000

# ===== Defaults =====
retain_available true
queue_qos0_messages false
upgrade_outgoing_qos false
