# Mosquitto config — ROS2-RCS Twin
# Edit only if necessary. Run init.sh on first deploy to generate certs + passwd.

# ===== Persistence =====
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ===== Logging =====
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
connection_messages true

# ===== Listener 1: plain MQTT (port 1883) =====
# Used by health checks and Docker internal services.
# DO NOT expose to Internet — firewall it.
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ===== Listener 2: MQTT/TLS (port 8883) =====
# Public-facing. All RCS and Jetson clients use this.
listener 8883 0.0.0.0
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# ===== Listener 3: WebSocket (port 9001) =====
# Futuro: pra clientes web (RCS browser-based).
listener 9001 0.0.0.0
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ===== Connection limits =====
max_connections 100
max_inflight_messages 50
max_queued_messages 1000

# ===== Defaults =====
retain_available true
queue_qos0_messages false
upgrade_outgoing_qos false
