# coturn config — TURN/STUN server pra WebRTC NAT traversal
# Pra Phase 8 deployment na VPS.

# Listening
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0  # CHANGE to VPS public IP

# UDP relay range — must be opened on firewall
min-port=49152
max-port=65535

# Authentication
lt-cred-mech
realm=ros2-rcs.example.com  # CHANGE to your domain
user=rcs_operator:CHANGE_ME_SECURE
user=ugv_client:CHANGE_ME_SECURE

# TLS
cert=/certs/server.crt
pkey=/certs/server.key

# Logging
verbose
log-file=stdout
no-stdout-log=false

# Security
fingerprint
no-multicast-peers
no-loopback-peers
no-tlsv1
no-tlsv1_1
