# Mosquitto MQTT broker for CEROS / ROS2-RCS Twin — F2 deployment
#
# Deploy: any Linux Docker host (VPS recommended Ubuntu 22.04+; also runs
# locally for smoke tests).
#
# Usage:
#   ./wizard.sh         (one-command, prompts for user/password)
#   ./init.sh           (generate passwd file manually)
#   ./deploy.sh up      (start manually after init.sh)
#
# coturn (WebRTC TURN) was here in F1 design; deferred to F4 (camera).
# TLS listener 8883 deferred to F10 (hardening).

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: ceros-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT plaintext — Jetson bridge
      - "9001:9001"   # MQTT WebSocket — Electron frontend
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "127.0.0.1", "-p", "1883", "-u", "health", "-P", "health", "-t", "$$SYS/#", "-C", "1", "-W", "5"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local
